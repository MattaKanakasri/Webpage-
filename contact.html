<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact – ITZFIZZ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
 background:linear-gradient(135deg,#05001a,#4e00ff,#d100ff,#00eaff);
 background-size:400%;
 animation:bgflow 20s infinite alternate ease-in-out;
 color:white;overflow-x:hidden;
}
@keyframes bgflow{
 0%{background-position:0 50%;}
 50%{background-position:100% 50%;}
 100%{background-position:0 50%;}
}

/* NAVBAR */
nav{
 position:fixed;top:0;width:100%;
 display:flex;justify-content:space-between;align-items:center;
 padding:15px 25px;background:rgba(255,255,255,0.12);
 backdrop-filter:blur(12px);z-index:999;
}
nav a{color:cyan;margin:0 15px;text-decoration:none;font-weight:600;}
nav h2{color:#00eaff;font-size:25px;font-weight:900;}

/* HEADER */
header{
 height:40vh;display:flex;justify-content:center;
 align-items:center;text-align:center;padding-top:80px;
}
header h1{
 font-size:50px;font-weight:900;text-shadow:0 0 20px cyan;
 opacity:0;
}
header p{
 opacity:0;margin-top:10px;font-size:18px;
}

/* CONTACT SECTION */
.contact-wrapper{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
 gap:30px;padding:40px;margin-top:30px;
}

/* LEFT SIDE */
.contact-info{
 background:rgba(255,255,255,0.1);
 padding:25px;border-radius:20px;
 backdrop-filter:blur(15px);
 transform:translateY(40px);opacity:0;
}
.contact-info h3{
 margin-bottom:15px;font-size:26px;color:#00eaff;
}
.info-row{
 margin:15px 0;display:flex;align-items:center;
}
.info-row i{
 font-size:25px;margin-right:15px;color:#00ffff;
}

/* SOCIAL ICONS */
.social-icons i{
 font-size:30px;margin-right:15px;color:#00eaff;
 cursor:pointer;transition:.3s;
}
.social-icons i:hover{transform:scale(1.2);}

/* RIGHT SIDE FORM */
.contact-form{
 background:rgba(255,255,255,0.1);
 padding:25px;border-radius:20px;
 backdrop-filter:blur(15px);
 transform:translateY(40px);opacity:0;
}
.contact-form h3{font-size:26px;color:#00eaff;margin-bottom:15px;}
.contact-form input,
.contact-form textarea{
 width:100%;padding:12px;margin:10px 0;
 border:none;border-radius:10px;
 background:rgba(255,255,255,0.2);
 color:white;font-size:16px;
}
.contact-form button{
 width:100%;padding:15px;
 background:#00eaff;color:black;border:none;
 border-radius:12px;font-weight:700;
 cursor:pointer;box-shadow:0 0 20px #00ffff;
 transition:0.3s;
}
.contact-form button:hover{
 transform:scale(1.05);
}

/* MAP SECTION */
.map{
 margin:40px auto;padding:10px;width:90%;
 border-radius:20px;overflow:hidden;
 opacity:0;transform:translateY(40px);
}

/* FOOTER */
footer{
 padding:40px;text-align:center;margin-top:40px;
 background:rgba(255,255,255,0.12);
}
footer i{
 margin:0 10px;font-size:25px;color:#00eaff;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
 <h2>ITZFIZZ</h2>
 <div>
  <a href="index.html">Home</a>
  <a href="project.html">Projects</a>
  <a href="contact.html">Contact</a>
 </div>
</nav>

<!-- HEADER -->
<header>
 <div>
  <h1 id="title">Contact Us</h1>
  <p id="subtitle">Let's build something amazing together.</p>
 </div>
</header>

<!-- CONTACT SECTION -->
<div class="contact-wrapper">

 <!-- LEFT SIDE -->
 <div class="contact-info">
   <h3>Get in Touch</h3>

   <div class="info-row">
     <i class="fa-solid fa-phone"></i>
     <p>+91 98765 43210</p>
   </div>

   <div class="info-row">
     <i class="fa-solid fa-envelope"></i>
     <p>support@itzfizz.com</p>
   </div>

   <div class="info-row">
     <i class="fa-solid fa-location-dot"></i>
     <p>Bangalore, India</p>
   </div>

   <h3 style="margin-top:20px;">Follow Us</h3>
   <div class="social-icons">
     <i class="fa-brands fa-instagram"></i>
     <i class="fa-brands fa-facebook"></i>
     <i class="fa-brands fa-x-twitter"></i>
     <i class="fa-brands fa-linkedin"></i>
   </div>
 </div>

 <!-- RIGHT SIDE FORM -->
 <div class="contact-form">
   <h3>Send Message</h3>

   <input type="text" placeholder="Your Name">
   <input type="email" placeholder="Your Email">
   <textarea rows="5" placeholder="Your Message"></textarea>

   <button>Submit</button>
 </div>

</div>

<!-- MAP -->
<div class="map">
 <iframe 
   src="https://maps.google.com/maps?q=bangalore&t=&z=13&ie=UTF8&iwloc=&output=embed"
   width="100%" height="350" frameborder="0" style="border:0;">
 </iframe>
</div>

<!-- FOOTER -->
<footer>
 <p>© 2024 ITZFIZZ — All Rights Reserved</p>
 <div>
  <i class="fa-brands fa-facebook"></i>
  <i class="fa-brands fa-instagram"></i>
  <i class="fa-brands fa-x-twitter"></i>
 </div>
</footer>

<script>
gsap.registerPlugin(ScrollTrigger);

/* HEADER ANIMATION */
gsap.to("#title",{opacity:1,y:-10,duration:1.5});
gsap.to("#subtitle",{opacity:1,y:-5,duration:1.8,delay:.3});

/* CONTACT SECTION ANIMATION */
gsap.to(".contact-info",{
 opacity:1,y:0,duration:1.3,
 scrollTrigger:{trigger:".contact-info",start:"top 85%"}
});

gsap.to(".contact-form",{
 opacity:1,y:0,duration:1.3,delay:.2,
 scrollTrigger:{trigger:".contact-form",start:"top 85%"}
});

/* MAP ANIMATION */
gsap.to(".map",{
 opacity:1,y:0,duration:1.3,
 scrollTrigger:{trigger:".map",start:"top 85%"}
});
</script>

</body>
</html>
